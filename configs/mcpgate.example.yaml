# Configuração de exemplo do mcpgate — referência do schema.
#
# Overrides via ambiente: qualquer chave pode ser sobrescrita com o prefixo
# MCPGATE_ e "_" no lugar de ".". Ex.: MCPGATE_AUDIT_SINK=file.

# Endereço do transporte HTTP voltado ao agente (serve --transport http).
listen: ":8080"

# Principal provisório devolvido pelo resolver de identidade enquanto não há
# autenticação real (estágio E4 troca o resolver). Vazio => "anonymous".
default_agent: "anonymous"

# Servidores MCP upstream que o gateway fronteia. O `name` é único e vira o
# prefixo de namespace das tools (ex.: a tool `list_issues` do upstream `github`
# é exposta ao agente como `github.list_issues`).
upstreams:
  # Exemplo stdio: o gateway sobe o processo e fala stdin/stdout com ele.
  - name: everything
    transport: stdio
    command: ["npx", "-y", "@modelcontextprotocol/server-everything"]

  # Exemplo http: o gateway fala o transporte streamable HTTP com o endpoint.
  - name: postgres
    transport: http
    url: "http://localhost:9001/mcp"

# RBAC por ferramenta (estágio 2). Postura default-deny: o que não casa nenhuma
# lista é negado no tools/call. deny tem precedência sobre allow. A tool negada
# CONTINUA visível no tools/list (filtrar a descoberta é o épico E3). Nomes são
# NAMESPACED (<upstream>.<tool>).
policy:
  default: deny
  allow_tools:
    - everything.echo
    - postgres.query
  deny_tools:
    - postgres.drop_table

  # Opcional: regras por principal. Se o principal tiver entrada aqui, ela
  # substitui as listas globais acima; senão valem as globais.
  agents:
    ci-bot:
      default: deny
      allow_tools:
        - everything.echo

# Quota de admissão por agente: token bucket in-process, puro-Go (sem store
# externo). Defesa contra DoS por exaustão de recursos (SAFE-MCP / Impact).
# rps<=0 desliga o rate limiting; com rps>0 o burst precisa ser >=1.
rate_limit:
  rps: 10
  burst: 20

# Log de auditoria: uma linha JSONL por tools/call, com `decision` e `identity`.
audit:
  sink: "stdout"     # "stdout" | "file"
  format: "jsonl"
  path: ""           # caminho do arquivo quando sink=file
