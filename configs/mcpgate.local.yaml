# Config local para testar o fluxo na mão (boota sem dependências externas além
# do npx). Um único upstream stdio: o "everything" server de referência do MCP.
#
# A auditoria vai para um ARQUIVO de propósito: em transporte stdio o protocolo
# JSON-RPC trafega pelo stdout, então mandar o log para stdout poluiria o canal.
# Com sink=file, o stdout fica limpo e você acompanha a auditoria com
# `tail -f mcpgate-audit.jsonl` em outro terminal (vale para http também).
listen: ":8080"

# Principal provisório que o resolver de identidade devolve (E2 não tem auth
# real; o E4 troca o resolver). A política abaixo pode referenciar este agente.
default_agent: "anonymous"

upstreams:
  - name: everything
    transport: stdio
    command: ["npx", "-y", "@modelcontextprotocol/server-everything"]

# RBAC por ferramenta (estágio 2). Postura default-deny: o que não casa nenhuma
# lista é negado. deny tem precedência sobre allow. Nomes são NAMESPACED.
policy:
  default: deny
  allow_tools:
    - everything.echo          # chamada PERMITIDA no smoke test
  deny_tools:
    - everything.add           # chamada NEGADA (deny explícito) no smoke test
  # everything.printEnv (e qualquer outra) cai no default-deny.

  # Perfil explícito do principal `anonymous` (o default_agent do caminho stdio).
  # Se um principal tem entrada em `agents`, ELA substitui as listas globais acima.
  # Aqui ele espelha a política global de propósito, para o smoke test stdio valer
  # tanto pela regra global quanto pela explícita (echo visível/permitida; add e
  # printEnv invisíveis/negadas no E3). Para explorar TODAS as tools no Inspector
  # stdio, troque o corpo por `default: allow` (libera tudo para o anonymous).
  agents:
    anonymous:
      default: deny
      allow_tools:
        - everything.echo
      deny_tools:
        - everything.add

# Quota de admissão por agente (token bucket in-process). A admissão roda ANTES
# do RBAC, então toda tentativa de tools/call consome um token (mesmo as negadas).
# burst folgado para o smoke demonstrar allow/deny/default-deny sem esbarrar no
# limite; o passo de rate limit estoura disparando muitas chamadas de uma vez.
rate_limit:
  rps: 5
  burst: 20

audit:
  sink: "file"
  format: "jsonl"
  path: "mcpgate-audit.jsonl"
